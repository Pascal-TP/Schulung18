<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Unterweisung - Sommerzeit</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 50px;
    }

    img {
      max-width: 90%;
      height: auto;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
    }

    audio {
      color: #4CAF50
    }

    #quiz-button {
      display: none;
      background-color: #4CAF50;
      color: white;
      font-weight: bold;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    #audio-player {
      background-color: #d9ecff;
      padding: 5px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h2>Unterweisung Sommerzeit</h2>

  <img id="bild" src="bilder_nmk/bild1.jpg" alt="Bild 1">

  <br>
<!-- <div class="controls">

    <audio id="audio-player" controls>
      <source id="audio-source" src="" type="audio/mpeg">
    </audio> -->

    <div class="nav-buttons">
      <button onclick="ersteSeite()">⏮ first page</button>
      <button onclick="zurueck()">◀ back</button>
      <button id="weiter-button" onclick="weiter()">next page ▶</button>
      <button id="letzte-button" onclick="letzteSeite()">last page ⏭</button>
      <!-- Quiz-Button, erscheint nur auf letzter Seite -->
      <a href="quiz.html"><button id="quiz-button">🧠 start quiz</button></a>
    </div>

  </div>

  <!-- Quiz-Button, erscheint nur auf letzter Seite -->
  <a href="quiz.html"><button id="quiz-button">🧠 start quiz</button></a>


  <p>Seite <span id="seite">1</span> von <span id="gesamtseiten">5</span></p>



  <script>
    // 🔢 Nur existierende Bilder eintragen
    const bilder = [
      "bilder_nmk/bild1.jpg",
      "bilder_nmk/bild2.jpg",
      "bilder_nmk/bild3.jpg",
      "bilder_nmk/bild4.jpg",
      "bilder_nmk/bild5.jpg",
      "bilder_nmk/bild6.jpg",
      "bilder_nmk/bild7.jpg",
      "bilder_nmk/bild8.jpg",
      "bilder_nmk/bild9.jpg",

      "bilder_nmk/bild13.jpg",
      "bilder_nmk/bild14.jpg",
      "bilder_nmk/bild15.jpg",
      "bilder_nmk/bild16.jpg",
      "bilder_nmk/bild17.jpg",
      "bilder_nmk/bild18.jpg",
      "bilder_nmk/bild19.jpg",
      "bilder_nmk/bild20.jpg",
      "bilder_nmk/bild21.jpg"
    ];

    // const audio = [
    //  "audio/audio1.mp3",

    //  "audio/audio3.mp3",
    //  "audio/audio4.mp3",
    //  "audio/audio5.mp3",
    //  "audio/audio6.mp3",
    //  "audio/audio7.mp3",
    //  "audio/audio8.mp3",
    //  "audio/audio9.mp3",
    //  "audio/audio10.mp3",
    //  "audio/audio11.mp3",
    //  "audio/audio12.mp3",
    //  "audio/audio13.mp3",
    //  "audio/audio14.mp3",
    //  "audio/audio15.mp3",
    //  "audio/audio16.mp3",
    //  "audio/audio17.mp3",
    //  "audio/audio18.mp3",
    //  "audio/audio19.mp3",
    //  "audio/audio20.mp3",
    //  "audio/audio21.mp3"
    // ];

    let aktuelleSeite = 0;

    function zeigeBild(index) {
      const img = document.getElementById("bild");
      img.src = bilder[index];
      img.alt = `Bild ${index + 1}`;
      document.getElementById("seite").textContent = index + 1;

    //  const player = document.getElementById("audio-player");
    //  const source = document.getElementById("audio-source");

      // vorher stoppen
    //  player.pause();
    //  player.currentTime = 0;

    //  source.src = audio[index];

    //  player.load();

      // erst starten wenn genug geladen wurde
    //  player.addEventListener("canplaythrough", function () {
    //    player.play();
    //  }, { once: true });

      // Quiz-Button und Weiter-/Letzte-Buttons steuern
      const quizBtn = document.getElementById("quiz-button");
      const weiterBtn = document.getElementById("weiter-button");
      const letzteBtn = document.getElementById("letzte-button");

      const istLetztesBild = (index === bilder.length - 1);
      quizBtn.style.display = istLetztesBild ? "inline-block" : "none";
      weiterBtn.style.display = istLetztesBild ? "none" : "inline-block";
      letzteBtn.style.display = istLetztesBild ? "none" : "inline-block";


    }

    function ersteSeite() {
      aktuelleSeite = 0;
      zeigeBild(aktuelleSeite);
    }

    function letzteSeite() {
      aktuelleSeite = bilder.length - 1;
      zeigeBild(aktuelleSeite);
    }

    function weiter() {
      if (aktuelleSeite < bilder.length - 1) {
        aktuelleSeite++;
        zeigeBild(aktuelleSeite);
      }
    }

    function zurueck() {
      if (aktuelleSeite > 0) {
        aktuelleSeite--;
        zeigeBild(aktuelleSeite);
      }
    }

    // Gesamtseiten anzeigen und erstes Bild laden
    document.getElementById("gesamtseiten").textContent = bilder.length;
    zeigeBild(aktuelleSeite);
  </script>

</body>

</html>
